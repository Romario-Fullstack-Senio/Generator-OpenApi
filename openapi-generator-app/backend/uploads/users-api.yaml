openapi: 3.0.0
info:
  title: Users API
  description: API para gestión de usuarios y perfiles
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v1
    description: Servidor de producción

tags:
  - name: usuarios
    description: Operaciones de usuarios
  - name: perfiles
    description: Operaciones de perfiles

paths:
  /usuarios:
    get:
      tags:
        - usuarios
      summary: Listar usuarios
      operationId: getUsuarios
      parameters:
        - name: filter
          in: query
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDTO'

    post:
      tags:
        - usuarios
      summary: Crear usuario
      operationId: createUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'

  /usuarios/{id}:
    get:
      tags:
        - usuarios
      summary: Obtener usuario por ID
      operationId: getUsuarioById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailDTO'

  /perfiles:
    get:
      tags:
        - perfiles
      summary: Listar perfiles
      operationId: getPerfiles
      responses:
        '200':
          description: Lista de perfiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileDTO'

components:
  schemas:
    UserDTO:
      type: object
      description: Información básica de usuario
      properties:
        identifier:
          type: integer
          format: int64
          description: Identificador único
        code:
          type: integer
          format: int64
          description: Código del usuario
        documentType:
          $ref: '#/components/schemas/DocumentType'
        firstName:
          type: string
          description: Nombres del usuario
        lastName:
          type: string
          description: Apellidos del usuario
        nickname:
          type: string
          description: Alias del usuario
        state:
          $ref: '#/components/schemas/State'
        contact:
          $ref: '#/components/schemas/ContactDTO'

    UserDetailDTO:
      allOf:
        - $ref: '#/components/schemas/UserDTO'
        - type: object
          properties:
            profile:
              $ref: '#/components/schemas/ProfileDTO'
            enrollment:
              $ref: '#/components/schemas/EnrollmentDTO'

    ProfileDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string

    ContactDTO:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string

    EnrollmentDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        enrollmentDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING]

    DocumentType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string

    State:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        active:
          type: boolean

    CodeGeneral:
      type: object
      properties:
        code:
          type: string
        description:
          type: string

    ResourceId:
      type: object
      properties:
        id:
          type: integer
          format: int64

    AuthenticationDTO:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        token:
          type: string

    ApiMessage:
      type: object
      properties:
        code:
          type: string
          description: Código de respuesta
        message:
          type: string
          description: Mensaje de respuesta
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
